<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AINAI - Logo & Brand Identity</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(135deg, #F7F3ED 0%, #E8DED0 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Logo Section */
        .logo-showcase {
            background: white;
            border-radius: 20px;
            padding: 60px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .logo-main {
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            position: relative;
        }

        .eye-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .eye {
            width: 50px;
            height: 50px;
            background: #8B4852;
            border-radius: 50% 0;
            position: absolute;
            animation: blink 4s infinite;
        }

        .eye.left {
            left: 10px;
            top: 35px;
            transform: rotate(45deg);
        }

        .eye.right {
            right: 10px;
            top: 35px;
            transform: rotate(135deg);
        }

        .eye-pupil {
            width: 18px;
            height: 18px;
            background: #D4AF7A;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes blink {
            0%, 48%, 52%, 100% {
                transform: rotate(45deg) scaleY(1);
            }
            50% {
                transform: rotate(45deg) scaleY(0.1);
            }
        }

        .eye.right {
            animation: blink 4s 0.1s infinite;
        }

        @keyframes blink-right {
            0%, 48%, 52%, 100% {
                transform: rotate(135deg) scaleY(1);
            }
            50% {
                transform: rotate(135deg) scaleY(0.1);
            }
        }

        .logo-text {
            font-size: 64px;
            font-weight: 300;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #8B4852 0%, #D4AF7A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .logo-arabic {
            font-size: 36px;
            color: #8B4852;
            font-family: 'Arial', sans-serif;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .tagline {
            font-size: 18px;
            color: #3A302B;
            font-style: italic;
            opacity: 0.7;
        }

        /* Color Palette */
        .color-palette {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .palette-title {
            font-size: 32px;
            color: #8B4852;
            margin-bottom: 30px;
            text-align: center;
        }

        .colors {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .color-card {
            text-align: center;
        }

        .color-swatch {
            height: 120px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }

        .color-swatch:hover {
            transform: translateY(-5px);
        }

        .color-name {
            font-size: 18px;
            font-weight: 600;
            color: #3A302B;
            margin-bottom: 5px;
        }

        .color-hex {
            font-size: 14px;
            color: #666;
            font-family: 'Courier New', monospace;
        }

        /* Logo Variations */
        .logo-variations {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .variation-card {
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .variation-card.dark {
            background: #3A302B;
        }

        .variation-card.light {
            background: white;
        }

        .variation-card.colored {
            background: #8B4852;
        }

        .variation-card .logo-text {
            font-size: 42px;
        }

        .variation-card.dark .logo-text,
        .variation-card.colored .logo-text {
            background: linear-gradient(135deg, #F7F3ED 0%, #D4AF7A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .variation-label {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
        }

        .variation-card.dark .variation-label,
        .variation-card.colored .variation-label {
            color: #F7F3ED;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo-showcase {
                padding: 40px 20px;
            }

            .logo-text {
                font-size: 48px;
            }

            .logo-arabic {
                font-size: 28px;
            }

            .variation-card .logo-text {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Main Logo Showcase -->
        <div class="logo-showcase">
            <div class="logo-main">
                <div class="logo-icon">
                    <div class="eye-container">
                        <div class="eye left">
                            <div class="eye-pupil"></div>
                        </div>
                        <div class="eye right">
                            <div class="eye-pupil"></div>
                        </div>
                    </div>
                </div>
                <h1 class="logo-text">AINAI</h1>
                <p class="logo-arabic">عَيناي</p>
                <p class="tagline">See Yourself Differently</p>
            </div>
        </div>

        <!-- Color Palette -->
        <div class="color-palette">
            <h2 class="palette-title">Brand Color Palette</h2>
            <div class="colors">
                <div class="color-card">
                    <div class="color-swatch" style="background: #8B4852;"></div>
                    <p class="color-name">Deep Burgundy</p>
                    <p class="color-hex">#8B4852</p>
                    <p style="font-size: 12px; color: #999; margin-top: 5px;">Primary</p>
                </div>
                <div class="color-card">
                    <div class="color-swatch" style="background: #D4AF7A;"></div>
                    <p class="color-name">Soft Gold</p>
                    <p class="color-hex">#D4AF7A</p>
                    <p style="font-size: 12px; color: #999; margin-top: 5px;">Secondary</p>
                </div>
                <div class="color-card">
                    <div class="color-swatch" style="background: #A8B5A0;"></div>
                    <p class="color-name">Muted Sage</p>
                    <p class="color-hex">#A8B5A0</p>
                    <p style="font-size: 12px; color: #999; margin-top: 5px;">Accent</p>
                </div>
                <div class="color-card">
                    <div class="color-swatch" style="background: #F7F3ED;"></div>
                    <p class="color-name">Warm Ivory</p>
                    <p class="color-hex">#F7F3ED</p>
                    <p style="font-size: 12px; color: #999; margin-top: 5px;">Neutral</p>
                </div>
                <div class="color-card">
                    <div class="color-swatch" style="background: #3A302B;"></div>
                    <p class="color-name">Charcoal Brown</p>
                    <p class="color-hex">#3A302B</p>
                    <p style="font-size: 12px; color: #999; margin-top: 5px;">Dark</p>
                </div>
            </div>
        </div>

        <!-- Logo Variations -->
        <div class="logo-variations">
            <div class="variation-card light">
                <div class="logo-icon" style="width: 80px; height: 80px; margin: 0 auto 15px;">
                    <div class="eye-container">
                        <div class="eye left" style="width: 35px; height: 35px; left: 7px; top: 22px;">
                            <div class="eye-pupil" style="width: 12px; height: 12px;"></div>
                        </div>
                        <div class="eye right" style="width: 35px; height: 35px; right: 7px; top: 22px;">
                            <div class="eye-pupil" style="width: 12px; height: 12px;"></div>
                        </div>
                    </div>
                </div>
                <h1 class="logo-text">AINAI</h1>
                <p class="variation-label">Light Background</p>
            </div>

            <div class="variation-card dark">
                <div class="logo-icon" style="width: 80px; height: 80px; margin: 0 auto 15px;">
                    <div class="eye-container">
                        <div class="eye left" style="width: 35px; height: 35px; left: 7px; top: 22px; background: #D4AF7A;">
                            <div class="eye-pupil" style="width: 12px; height: 12px; background: #F7F3ED;"></div>
                        </div>
                        <div class="eye right" style="width: 35px; height: 35px; right: 7px; top: 22px; background: #D4AF7A;">
                            <div class="eye-pupil" style="width: 12px; height: 12px; background: #F7F3ED;"></div>
                        </div>
                    </div>
                </div>
                <h1 class="logo-text">AINAI</h1>
                <p class="variation-label">Dark Background</p>
            </div>

            <div class="variation-card colored">
                <div class="logo-icon" style="width: 80px; height: 80px; margin: 0 auto 15px;">
                    <div class="eye-container">
                        <div class="eye left" style="width: 35px; height: 35px; left: 7px; top: 22px; background: #F7F3ED;">
                            <div class="eye-pupil" style="width: 12px; height: 12px; background: #D4AF7A;"></div>
                        </div>
                        <div class="eye right" style="width: 35px; height: 35px; right: 7px; top: 22px; background: #F7F3ED;">
                            <div class="eye-pupil" style="width: 12px; height: 12px; background: #D4AF7A;"></div>
                        </div>
                    </div>
                </div>
                <h1 class="logo-text">AINAI</h1>
                <p class="variation-label">Colored Background</p>
            </div>
        </div>
    </div>
</body>
</html>
